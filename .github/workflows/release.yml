name: Build & Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '22'
  WAILS3_VERSION: 'v3.0.0-alpha.74'
  APP_NAME: 'claude-router'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from VERSION file
        id: version
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check whether this version was already released
        id: check
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ steps.version.outputs.version }}$"; then
            echo "Tag v${{ steps.version.outputs.version }} already exists, skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: darwin
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Task
        shell: bash
        run: go install github.com/go-task/task/v3/cmd/task@latest

      - name: Install Wails3 CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS3_VERSION }}

      - name: Apply version from VERSION file to build config
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          sed -i.bak -E "s/^([[:space:]]*version:[[:space:]]*)\"[^\"]*\"/\1\"$VERSION\"/" build/config.yml
          rm -f build/config.yml.bak

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config

      - name: Install NSIS
        if: matrix.platform == 'windows'
        run: choco install nsis -y

      - name: Build & package (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: task windows:package

      - name: Build & package (macOS)
        if: matrix.platform == 'darwin'
        run: task darwin:package

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: task linux:build

      - name: Stage artifacts (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          mkdir -p dist
          cp bin/${{ env.APP_NAME }}-*-installer.exe dist/

      - name: Stage artifacts (macOS)
        if: matrix.platform == 'darwin'
        run: |
          mkdir -p dist
          ARCH=$(uname -m)
          [ "$ARCH" = "arm64" ] && ARCH="arm64" || ARCH="amd64"
          cd bin/release
          zip -r "../../dist/${APP_NAME}-macos-${ARCH}.zip" "${APP_NAME}.app"

      - name: Stage artifacts (Linux)
        if: matrix.platform == 'linux'
        run: |
          mkdir -p dist
          tar -C bin/release -czf "dist/${APP_NAME}-linux-amd64.tar.gz" "${APP_NAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: [prepare, build]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create and push tag
        run: |
          git tag "${{ needs.prepare.outputs.tag }}"
          git push origin "${{ needs.prepare.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          files: dist/*
          generate_release_notes: true
